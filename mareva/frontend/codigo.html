<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mareva — Beachwear</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">

<style>
:root {
  --bege: #f7f3ef;
  --verde: #5e7d6a;
}

body {
  margin: 0;
  font-family: 'Montserrat', sans-serif;
  background: var(--bege);
  padding-top: 80px;
}

/* HEADER */
header {
  position: fixed;
  top: 0;
  width: 100%;
  background: rgba(255,255,255,0.9);
  backdrop-filter: blur(10px);
  padding: 15px 20px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  box-sizing: border-box;
}

.logo {
  font-family: 'Playfair Display';
  font-size: 22px;
}

.menu {
  display: flex;
  align-items: center;
}

.menu a {
  margin-left: 15px;
  text-decoration: none;
  color: #333;
}

.cart-icon {
  cursor: pointer;
  margin-left: 15px;
}

/* HERO */
.hero {
  height: 100vh;
  background: url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e') center/cover;
  display: flex;
  justify-content: center;
  align-items: center;
  color: white;
  text-align: center;
}

/* PRODUTOS */
.section {
  padding: 60px 20px;
}

.products {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px,1fr));
  gap: 20px;
}

.card img {
  width: 100%;
  height: 300px;
  object-fit: cover;
}

.buy-btn {
  background: var(--verde);
  color: white;
  padding: 10px;
  text-align: center;
  cursor: pointer;
  margin-top: 10px;
}

/* CARRINHO */
#overlay {
  position: fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.4);
  opacity:0;
  visibility:hidden;
  transition:0.3s;
  z-index:1500;
}

#overlay.show {
  opacity:1;
  visibility:visible;
}

#cart {
  position: fixed;
  right:0;
  top:0;
  width:350px;
  height:100%;
  background:white;
  padding:20px;
  transform:translateX(100%);
  transition:0.35s;
  z-index:2000;
}

#cart.open {
  transform:translateX(0);
}

.cart-item {
  border-bottom:1px solid #eee;
  padding:10px 0;
}

.qtd-control {
  display:flex;
  gap:10px;
}

.qtd-control button {
  cursor:pointer;
}

.remove-btn {
  color:red;
  cursor:pointer;
  border:none;
  background:none;
}
</style>
</head>

<body>

<div id="overlay" onclick="closeCart()"></div>

<header>
  <div class="logo">MAREVA</div>

  <div class="menu">
    <a href="#colecao">Coleção</a>
    <a href="#historia">História</a>

    <a href="https://instagram.com/mareva.rio" target="_blank">Instagram</a>

    <div class="cart-icon" onclick="openCart()">
      🛒 <span id="count">0</span>
    </div>
  </div>
</header>

<section class="hero">
  <div>
    <h1>Feita de sal, sol e mar</h1>
  </div>
</section>

<section class="section" id="colecao">
  <h2>Coleção</h2>

  <div class="products">

    <div class="card">
      <img src="https://images.unsplash.com/photo-1520975916090-3105956dac38?auto=format&fit=crop&w=800&q=80">
      <h3>Vestido Brisa Tropical</h3>
      <p>R$ 189.90</p>
      <div class="buy-btn" onclick="addToCart('Vestido Brisa Tropical',189.90)">Adicionar</div>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1490481651871-ab68de25d43d?auto=format&fit=crop&w=800&q=80">
      <h3>Vestido Maré Alta</h3>
      <p>R$ 219.90</p>
      <div class="buy-btn" onclick="addToCart('Vestido Maré Alta',219.90)">Adicionar</div>
    </div>

  </div>
</section>

<!-- CARRINHO -->
<div id="cart">
  <div style="display:flex; justify-content:space-between;">
    <h3>Carrinho</h3>
    <span onclick="closeCart()">✕</span>
  </div>

  <div id="items"></div>

  <p>Total: R$ <span id="total">0</span></p>

  <a href="checkout.html" class="buy-btn">Finalizar</a>
</div>

<script>
let cart = JSON.parse(localStorage.getItem("cart")) || [];

function addToCart(nome, preco) {
  const existing = cart.find(item => item.nome === nome);

  if (existing) {
    existing.qtd += 1;
  } else {
    cart.push({ nome, preco, qtd: 1 });
  }

  saveCart();
}

function saveCart() {
  localStorage.setItem("cart", JSON.stringify(cart));
  updateCart();
}

function updateCart() {
  document.getElementById("count").innerText = cart.length;

  let html = "";
  let total = 0;

  cart.forEach((item, index) => {
    total += item.preco * item.qtd;

    html += `
      <div class="cart-item">
        <p>${item.nome}</p>
        <p>R$ ${item.preco}</p>

        <div class="qtd-control">
          <button onclick="changeQtd(${index}, -1)">-</button>
          <span>${item.qtd}</span>
          <button onclick="changeQtd(${index}, 1)">+</button>
        </div>

        <button class="remove-btn" onclick="removeItem(${index})">Remover</button>
      </div>
    `;
  });

  document.getElementById("items").innerHTML = html;
  document.getElementById("total").innerText = total.toFixed(2);
}

function changeQtd(index, change) {
  cart[index].qtd += change;

  if (cart[index].qtd <= 0) {
    cart.splice(index, 1);
  }

  saveCart();
}

function removeItem(index) {
  cart.splice(index, 1);
  saveCart();
}

function openCart() {
  document.getElementById("cart").classList.add("open");
  document.getElementById("overlay").classList.add("show");
}

function closeCart() {
  document.getElementById("cart").classList.remove("open");
  document.getElementById("overlay").classList.remove("show");
}

updateCart();
</script>

</body>
</html>
